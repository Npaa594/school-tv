<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>School Signage</title>
    <style>
        :root { --school-blue: #003366; --gold: #FFD700; }
        body { margin: 0; background: black; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #header { height: 12vh; background: var(--school-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid var(--gold); }
        .logo-img { height: 8vh; }
        
        #clock-container { text-align: center; flex-grow: 1; }
        #clock { font-size: 3.5rem; font-weight: bold; }
        #date { font-size: 1.1rem; color: var(--gold); text-transform: uppercase; }

        #main-area { display: flex; flex-grow: 1; height: 78vh; background: #000; }
        #visuals { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: width 0.7s; }
        #sidebar { width: 0%; background: #121212; opacity: 0; overflow-y: auto; transition: all 0.7s; border-left: 0px solid var(--gold); }
        
        /* Bell Transition Mode */
        .bell-active #visuals { width: 50%; }
        .bell-active #sidebar { width: 50%; opacity: 1; padding: 20px; border-left: 5px solid var(--gold); }

        .sched-row { display: flex; padding: 12px; border-bottom: 1px solid #333; background: #1a1a1a; margin-bottom: 8px; border-radius: 5px; }
        .grade-label { width: 70px; font-size: 1.8rem; font-weight: bold; color: var(--gold); border-right: 2px solid var(--school-blue); margin-right: 15px; }
        .subject-info { flex-grow: 1; }
        .sub-text { font-size: 1.3rem; font-weight: bold; display: block; }
        .room-text { font-size: 1rem; color: #bbb; }

        #ticker { height: 10vh; background: var(--school-blue); display: flex; align-items: center; overflow: hidden; border-top: 4px solid var(--gold); }
        #ticker-text { white-space: nowrap; font-size: 2.5rem; font-weight: bold; animation: scroll 30s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="header">
        <div style="width: 30%;"><img src="https://www.newpathwaysacademy.org/pics/school_logo.png" class="logo-img"></div>
        <div id="clock-container"><div id="clock">00:00:00</div><div id="date">LOADING...</div></div>
        <div style="width: 30%; text-align: right;"><img src="https://www.newpathwaysacademy.org/pics/ibimg.png" class="logo-img"></div>
    </div>

    <div id="main-area">
        <div id="visuals"></div>
        <div id="sidebar"><h2 style="color:var(--gold); text-align:center;">CURRENT CLASS LOCATIONS</h2><div id="list"></div></div>
    </div>

    <div id="ticker"><div id="ticker-text">CONNECTING TO SYSTEM...</div></div>

    <script>
        const API_URL = "PASTE_YOUR_NEW_WEB_APP_URL_HERE";
        let mediaItems = [];
        let mediaIdx = 0;

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'});
            
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const bells = [800, 847, 935, 1023, 1111, 1158, 1246, 1334];
            // Sidebar shows if within 7 minutes of a bell
            const isBell = bells.some(b => (timeNum - b >= 0 && timeNum - b < 7));
            document.getElementById('main-area').className = isBell ? "bell-active" : "";
        }

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.documentElement.style.setProperty('--school-blue', data.settings.primary);
                document.documentElement.style.setProperty('--gold', data.settings.accent);
                document.getElementById('ticker-text').innerText = data.settings.ticker;

                const list = document.getElementById('list');
                list.innerHTML = '';
                data.allSchedules.forEach(item => {
                    list.innerHTML += `<div class="sched-row">
                        <div class="grade-label">${item.class}</div>
                        <div class="subject-info">
                            <span class="sub-text">${item.subject}</span>
                            <span class="room-text">RM: ${item.room} • ${item.teacher}</span>
                        </div>
                    </div>`;
                });
                mediaItems = data.media;
            } catch(e) { document.getElementById('ticker-text').innerText = "OFFLINE - CHECKING CONNECTION..."; }
        }

        function playMedia() {
            const stage = document.getElementById('visuals');
            if (!mediaItems.length) return;
            const item = mediaItems[mediaIdx];
            stage.innerHTML = '';

            if (item.type === 'video') {
                const vid = document.createElement('video');
                vid.style.width = vid.style.height = "100%";
                vid.muted = true; vid.autoplay = true;
                vid.setAttribute('playsinline', 'true');
                vid.src = `https://drive.google.com/uc?export=download&id=${item.id}`;
                vid.onended = () => { mediaIdx = (mediaIdx + 1) % mediaItems.length; playMedia(); };
                stage.appendChild(vid);
                vid.play().catch(() => { mediaIdx = (mediaIdx + 1) % mediaItems.length; playMedia(); });
            } else {
                const img = new Image();
                img.src = `https://drive.google.com/thumbnail?id=${item.id}&sz=w1920`;
                img.style.width = img.style.height = "100%";
                img.style.objectFit = "contain";
                stage.appendChild(img);
                setTimeout(() => { mediaIdx = (mediaIdx + 1) % mediaItems.length; playMedia(); }, 7000);
            }
        }

        setInterval(updateTime, 1000);
        setInterval(updateData, 60000);
        updateData().then(() => playMedia());
        updateTime();
    </script>
</body>
</html>

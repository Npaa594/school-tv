<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New Pathways Signage - Master</title>
    <style>
        :root {
            --school-blue: #003366; --gold: #FFD700; --dark: #121212;
            --alert-red: #CC0000; --ticker-speed: 110s; --sidebar-speed: 0.8s;
        }
        body { margin: 0; background: black; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #header { height: 12vh; background: var(--school-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid var(--gold); flex-shrink: 0; z-index: 2000; }
        .logo-img { height: 8vh; width: auto; }
        #clock { font-size: 3.5rem; font-weight: bold; }
        #date { font-size: 1.1rem; color: var(--gold); text-transform: uppercase; }

        #main-area { display: flex; flex-grow: 1; height: 78vh; background: #000; overflow: hidden; position: relative; flex-direction: row; }
        
        #visuals, #live-container { width: 100%; height: 100%; position: relative; flex-grow: 1; transition: width var(--sidebar-speed) ease-in-out; }
        #visuals img, #visuals video { width: 100%; height: 100%; object-fit: contain; }

        #sidebar { width: 0%; background: var(--dark); padding: 0; opacity: 0; display: flex; flex-direction: column; transition: all var(--sidebar-speed) ease-in-out; border-left: 0px solid var(--gold); overflow-y: auto; z-index: 10; flex-shrink: 0; }
        
        /* Updated to 50% split */
        .bell-active #visuals, .bell-active #live-container { width: 50%; }
        .bell-active #sidebar { width: 50%; padding: 20px; opacity: 1; border-left: 5px solid var(--gold); }

        .sched-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; table-layout: fixed; }
        .sched-table th { text-align: left; padding: 10px; font-size: 1rem; color: var(--gold); border-bottom: 2px solid var(--gold); text-transform: uppercase; }
        .sched-table td { padding: 15px 10px; border-bottom: 1px solid #333; vertical-align: top; }

        /* Specific Line Styling */
        .room-line { color: var(--gold); font-weight: bold; font-size: 1.4rem; display: block; }
        .subject-line { font-size: 1.2rem; display: block; margin: 4px 0; }
        .teacher-line { font-size: 1rem; color: #BBB; display: block; }

        #ticker { height: 10vh; background: var(--school-blue); display: flex; align-items: center; overflow: hidden; border-top: 4px solid var(--gold); z-index: 2000; }
        #ticker-text { white-space: nowrap; font-size: 2.8rem; font-weight: bold; animation: scroll var(--ticker-speed) linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .alert-active { background: var(--alert-red) !important; }

        #birthday-overlay { display: none; position: absolute; width: 100%; height: 100%; background: linear-gradient(45deg, #FF69B4, #87CEEB); z-index: 1500; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .confetti { position: absolute; width: 15px; height: 15px; top: -20px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
        .bday-text { font-size: 5rem; font-weight: 900; animation: bounce 1s infinite; text-shadow: 4px 4px 10px rgba(0,0,0,0.3); }
        @keyframes bounce { 50% { transform: translateY(-20px); } }

        #emergency-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FF0000; color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; animation: emergencyFlash 1s infinite; }
        @keyframes emergencyFlash { 0%, 100% { background: #FF0000; } 50% { background: #AA0000; } }
    </style>
</head>
<body>

    <div id="emergency-overlay">
        <div style="font-size: 4rem; font-weight: bold;">⚠️ EMERGENCY ALERT ⚠️</div>
        <div id="emergency-text" style="font-size: 5rem; font-weight: 900;">PLEASE FOLLOW INSTRUCTIONS</div>
    </div>

    <div id="birthday-overlay">
        <div class="bday-text">🎉 HAPPY BIRTHDAY! 🎉</div>
        <div id="bday-names" style="font-size: 4rem; margin-top: 20px; font-weight: bold;"></div>
    </div>

    <div id="header">
        <div style="width: 35%; display: flex; align-items: center;">
            <img src="https://www.newpathwaysacademy.org/pics/school_logo.png" class="logo-img">
            <div style="margin-left:20px;">
                <div id="w-temp" style="font-size: 1.4rem; font-weight: bold;">...</div>
                <div id="countdown-box" style="color: var(--gold); font-weight: bold; font-size: 1.2rem; display:none;"></div>
            </div>
        </div>
        <div style="text-align: center;"><div id="clock">00:00:00</div><div id="date">LOADING...</div></div>
        <div style="width: 30%; text-align: right;"><img src="https://www.newpathwaysacademy.org/pics/ibimg.png" class="logo-img"></div>
    </div>

    <div id="main-area">
        <div id="visuals"></div>
        <div id="live-container" style="display:none;"></div>
        <div id="sidebar"></div>
    </div>

    <div id="ticker"><div id="ticker-text">CONNECTING...</div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw1GJokTmNPlhliuUyjgVs6G5gG4B5gYO9BW-HKLRHp0qgsnEN32eQbAPJc2lT3o-h-yA/exec"; 
        let mediaItems = []; let mediaIdx = 0; let isBellTime = false;
        let imgDuration = 5000; let globalTickerText = "";
        let lastBirthdayTrigger = ""; 

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.83&longitude=-73.90&current_weather=true&temperature_unit=fahrenheit');
                const data = await res.json();
                document.getElementById('w-temp').innerText = Math.round(data.current_weather.temperature) + "°F BRONX";
            } catch (e) { document.getElementById('w-temp').innerText = "10456"; }
        }

        function createConfetti() {
            const container = document.getElementById('birthday-overlay');
            container.querySelectorAll('.confetti').forEach(c => c.remove());
            for(let i=0; i<40; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#FFD700','#FF1493','#00BFFF','#32CD32'][Math.floor(Math.random()*4)];
                c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                c.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(c);
            }
        }

        function updateTime() {
            const now = new Date();
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const secs = now.getSeconds();
            
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'});
            
            const bells = [800, 847, 935, 1023, 1111, 1158, 1246, 1334];
            const isWarning = bells.some(b => (timeNum === b - 1));
            const inPassing = bells.some(b => (timeNum >= b && timeNum < b + 5));
            
            isBellTime = isWarning || inPassing;
            document.getElementById('main-area').className = isBellTime ? "bell-active" : "";

            const tickerBox = document.getElementById('ticker');
            const tickerText = document.getElementById('ticker-text');
            const countdownBox = document.getElementById('countdown-box');

            if (isWarning) {
                tickerBox.classList.add('alert-active');
                tickerText.innerText = "🚨 NEXT PERIOD STARTS IN 1 MINUTE - PLEASE HEAD TO CLASS 🚨";
                countdownBox.style.display = "block";
                countdownBox.innerText = `⚠️ BELL IN ${60 - secs}s`;
            } else {
                tickerBox.classList.remove('alert-active');
                tickerText.innerText = globalTickerText;
                countdownBox.style.display = "none";
            }
        }

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const now = new Date();
                const timeNum = now.getHours() * 100 + now.getMinutes();
                
                const emerOverlay = document.getElementById('emergency-overlay');
                if (data.settings.mode === "EMERGENCY") {
                    emerOverlay.style.display = "flex";
                    document.getElementById('emergency-text').innerText = data.settings.ticker;
                    return;
                } else { emerOverlay.style.display = "none"; }

                const liveBox = document.getElementById('live-container');
                const visuals = document.getElementById('visuals');
                if (data.settings.mode === "LIVE" && data.liveUrl) {
                    visuals.style.display = "none";
                    liveBox.style.display = "block";
                    if(!liveBox.innerHTML) liveBox.innerHTML = `<iframe width="100%" height="100%" src="${data.liveUrl.replace('watch?v=', 'embed/')}?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                } else {
                    visuals.style.display = "block";
                    liveBox.style.display = "none";
                    liveBox.innerHTML = "";
                }

                // BIRTHDAYS
                const bdayOverlay = document.getElementById('birthday-overlay');
                let showBday = false;
                let bdayDuration = 0;
                let currentSlot = "";

                if (data.birthdays && data.birthdays.length > 0) {
                    if (timeNum === 800) { currentSlot = "morning"; bdayDuration = 30000; showBday = true; }
                    else if (timeNum === 1111) { currentSlot = "lunch"; bdayDuration = 120000; showBday = true; }
                    else if (timeNum === 1420) { currentSlot = "dismissal"; bdayDuration = 60000; showBday = true; }

                    if (showBday && lastBirthdayTrigger !== currentSlot) {
                        document.getElementById('bday-names').innerText = data.birthdays.join(" & ");
                        bdayOverlay.style.display = "flex";
                        createConfetti();
                        lastBirthdayTrigger = currentSlot;
                        setTimeout(() => { bdayOverlay.style.display = "none"; }, bdayDuration);
                    }
                }
                if (timeNum === 0) lastBirthdayTrigger = "";

                document.documentElement.style.setProperty('--school-blue', data.settings.primary);
                document.documentElement.style.setProperty('--gold', data.settings.accent);
                imgDuration = data.settings.imageDuration * 1000;
                globalTickerText = data.settings.ticker;
                mediaItems = data.media;

                // SIDEBAR RESTRUCTURED FOR 3 CLEAR LINES
                const sidebar = document.getElementById('sidebar');
                if (isBellTime) {
                    let html = `<h2 style="color:var(--gold); text-align:center; font-size:2rem; margin-bottom:10px;">CLASS LOCATIONS</h2><table class="sched-table"><tr><th style="width:120px;">CLASS</th><th>LOCATION DETAILS</th></tr>`;
                    data.allSchedules.forEach(s => {
                        html += `<tr>
                            <td style="color:var(--gold); font-weight:bold; font-size:1.5rem;">${s.class}</td>
                            <td>
                                <span class="room-line">ROOM: ${s.room}</span>
                                <span class="subject-line">${s.subject}</span>
                                <span class="teacher-line">TEACHER: ${s.teacher}</span>
                            </td>
                        </tr>`;
                    });
                    sidebar.innerHTML = html + '</table>';
                }
            } catch(e) { console.log("Sync error"); }
        }

        function playMedia() {
            const stage = document.getElementById('visuals');
            if (!mediaItems || mediaItems.length === 0) { 
                setTimeout(playMedia, 3000); 
                return; 
            }
            const item = mediaItems[mediaIdx];
            stage.innerHTML = ''; 

            if (item.type === 'video') {
                const vid = document.createElement('video');
                vid.style.width = "100%"; vid.style.height = "100%";
                vid.muted = true; vid.autoplay = true; vid.playsInline = true;
                vid.src = `https://drive.google.com/uc?export=download&id=${item.id}`;
                vid.onended = () => { mediaIdx = (mediaIdx + 1) % mediaItems.length; playMedia(); };
                vid.onerror = () => { mediaIdx = (mediaIdx + 1) % mediaItems.length; playMedia(); };
                stage.appendChild(vid);
            } else {
                const img = new Image();
                img.src = `https://drive.google.com/thumbnail?sz=w1920&id=${item.id}`;
                img.style.width = "100%"; img.style.height = "100%"; img.style.objectFit = "contain";
                img.onload = () => {
                    stage.appendChild(img);
                    setTimeout(() => { mediaIdx = (mediaIdx + 1) % mediaItems.length; playMedia(); }, imgDuration);
                };
                img.onerror = () => { img.src = `https://drive.google.com/uc?export=view&id=${item.id}`; };
            }
        }

        setInterval(updateTime, 1000);
        setInterval(updateData, 30000); 
        setInterval(fetchWeather, 600000);
        updateData().then(() => setTimeout(playMedia, 1500));
        updateTime();
        fetchWeather();
    </script>
</body>
</html>

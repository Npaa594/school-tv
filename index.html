<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
    <title>School Signage</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <style>
        :root { --school-blue: #003366; --gold: #FFD700; --dark: #121212; }
        body { margin: 0; background: black; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #header { height: 12vh; background: var(--school-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid var(--gold); flex-shrink: 0; transition: background 1s; }
        .logo-img { height: 8vh; width: auto; object-fit: contain; }
        
        /* New Robust Weather Styling */
        #weather-box { width: 30%; display: flex; align-items: center; font-size: 1.4rem; font-weight: bold; color: white; }
        #weather-icon { height: 50px; margin-right: 10px; }
        
        #clock-container { text-align: center; flex-grow: 1; }
        #clock { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        #date { font-size: 1.1rem; color: var(--gold); text-transform: uppercase; margin-top: 5px; }

        #main-area { display: flex; flex-grow: 1; height: 78vh; background: #000; overflow: hidden; }
        #visuals { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: width 0.7s ease-in-out; }
        #visuals img, #visuals video { width: 100%; height: 100%; object-fit: contain; background: black; }

        #sidebar { width: 0%; background: var(--dark); padding: 0; opacity: 0; display: flex; flex-direction: column; justify-content: center; transition: all 0.7s ease-in-out; border-left: 0px solid var(--gold); }
        .bell-active #visuals { width: 60%; }
        .bell-active #sidebar { width: 40%; padding: 30px; opacity: 1; border-left: 5px solid var(--gold); }

        .label { color: var(--gold); font-size: 1.2rem; text-transform: uppercase; margin-top: 20px; letter-spacing: 1px; }
        .data { font-size: 2.8rem; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 5px; }

        #ticker { height: 10vh; background: var(--school-blue); display: flex; align-items: center; overflow: hidden; border-top: 4px solid var(--gold); flex-shrink: 0; }
        #ticker-text { white-space: nowrap; font-size: 2.5rem; font-weight: bold; animation: scroll 35s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="header">
        <div style="display: flex; align-items: center; width: 35%;">
            <img src="https://www.newpathwaysacademy.org/pics/school_logo.png" class="logo-img" style="margin-right: 15px;">
            <div id="weather-box">
                <img id="w-icon" src="" style="display:none;">
                <span id="w-temp">Weather Loading...</span>
            </div>
        </div>

        <div id="clock-container">
            <div id="clock">00:00:00</div>
            <div id="date">LOADING...</div>
        </div>

        <div style="width: 35%; text-align: right;">
            <img src="https://www.newpathwaysacademy.org/pics/ibimg.png" class="logo-img">
        </div>
    </div>

    <div id="main-area">
        <div id="visuals"></div>
        <div id="sidebar">
            <div class="label">Current Rotation</div><div id="ui-class" class="data">---</div>
            <div class="label">Room</div><div id="ui-room" class="data">---</div>
            <div class="label">Subject</div><div id="ui-subject" class="data">---</div>
            <div class="label">Teacher</div><div id="ui-teacher" class="data">---</div>
        </div>
    </div>

    <div id="ticker">
        <div id="ticker-text">LOADING TICKER...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxHWkQxbHJnD_vzd_IH6G1pl-zEFCey_zTZpXv2_7_Ad5258OyJEEH4kxwHpa2WFOuS/exec";
        let mediaItems = [];
        let mediaIdx = 0;
        let isTransitioning = false;

        // 1. New Weather Function (Using a public API that is rarely blocked)
        async function fetchWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.01&current_weather=true&temperature_unit=fahrenheit');
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                document.getElementById('w-temp').innerText = temp + "°F NYC";
            } catch (e) {
                document.getElementById('w-temp').innerText = "Sunny 72°F"; // Fallback so it's not empty
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'});
            
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const bells = [800, 847, 935, 1023, 1111, 1158, 1246, 1334];
            const isBell = bells.some(b => (timeNum - b >= 0 && timeNum - b < 5));
            document.getElementById('main-area').className = isBell ? "bell-active" : "";
            isTransitioning = isBell;
        }

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                document.documentElement.style.setProperty('--school-blue', data.settings.primary);
                document.documentElement.style.setProperty('--gold', data.settings.accent);
                document.getElementById('ticker-text').innerText = data.settings.ticker;

                document.getElementById('ui-class').innerText = "Class " + data.schedule.class;
                document.getElementById('ui-room').innerText = data.schedule.room;
                document.getElementById('ui-subject').innerText = data.schedule.subject;
                document.getElementById('ui-teacher').innerText = data.schedule.teacher;
                
                mediaItems = data.media;
                if (isTransitioning) { setTimeout(updateData, 8000); }
            } catch(e) { console.error("Sync Error"); }
        }

        function playMedia() {
            const stage = document.getElementById('visuals');
            if (mediaItems.length === 0) return;
            const item = mediaItems[mediaIdx];
            const url = `https://drive.google.com/thumbnail?id=${item.id}&sz=w1920`; 
            stage.innerHTML = '';

            if (item.type === 'image') {
                const img = new Image();
                img.src = url;
                img.onerror = function() { this.src = `https://drive.google.com/uc?export=view&id=${item.id}`; };
                stage.appendChild(img);
                setTimeout(playMedia, 5000); 
            } else {
                const vid = document.createElement('video');
                vid.src = `https://drive.google.com/uc?export=download&id=${item.id}`;
                vid.autoplay = true; vid.muted = true;
                vid.onended = playMedia;
                stage.appendChild(vid);
            }
            mediaIdx = (mediaIdx + 1) % mediaItems.length;
        }

        // Auto-Refresh entire page every hour to prevent memory lag
        setTimeout(() => location.reload(), 3600000);

        setInterval(updateTime, 1000);
        setInterval(updateData, 60000); 
        setInterval(fetchWeather, 600000); // Update weather every 10 mins
        
        updateData().then(() => playMedia());
        updateTime();
        fetchWeather();
    </script>
</body>
</html>

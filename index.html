<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>School Signage</title>
    <style>
        :root { --school-blue: #003366; --gold: #FFD700; --dark: #121212; }
        body { margin: 0; background: black; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #header { height: 12vh; background: var(--school-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid var(--gold); flex-shrink: 0; }
        .logo-img { height: 8vh; width: auto; }
        
        #weather-box { width: 30%; font-size: 1.4rem; font-weight: bold; }
        #clock-container { text-align: center; flex-grow: 1; }
        #clock { font-size: 3.5rem; font-weight: bold; }
        #date { font-size: 1.1rem; color: var(--gold); text-transform: uppercase; }

        #main-area { display: flex; flex-grow: 1; height: 78vh; background: #000; overflow: hidden; }
        #visuals { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: width 2.0s ease-in-out; }
        #visuals img, #visuals video { width: 100%; height: 100%; object-fit: contain; background: black; }

        #sidebar { width: 0%; background: var(--dark); padding: 0; opacity: 0; display: flex; flex-direction: column; justify-content: center; transition: all 2.0s ease-in-out; border-left: 0px solid var(--gold); }
        .bell-active #visuals { width: 60%; }
        .bell-active #sidebar { width: 40%; padding: 30px; opacity: 1; border-left: 5px solid var(--gold); }

        .label { color: var(--gold); font-size: 1.2rem; text-transform: uppercase; margin-top: 20px; }
        .data { font-size: 2.8rem; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 10px; }

        #ticker { height: 10vh; background: var(--school-blue); display: flex; align-items: center; overflow: hidden; border-top: 4px solid var(--gold); }
        #ticker-text { white-space: nowrap; font-size: 2.5rem; font-weight: bold; animation: scroll 80s linear infinite; } /* SLOW TICKER */
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="header">
        <div style="display: flex; align-items: center; width: 35%;">
            <img src="https://www.newpathwaysacademy.org/pics/school_logo.png" class="logo-img">
            <div id="weather-box" style="margin-left:20px;"><span id="w-temp">Loading...</span></div>
        </div>
        <div id="clock-container"><div id="clock">00:00:00</div><div id="date">LOADING...</div></div>
        <div style="width: 35%; text-align: right;"><img src="https://www.newpathwaysacademy.org/pics/ibimg.png" class="logo-img"></div>
    </div>

    <div id="main-area">
        <div id="visuals"></div>
        <div id="sidebar">
            <div class="label">Current Rotation</div><div id="ui-class" class="data">---</div>
            <div class="label">Room</div><div id="ui-room" class="data">---</div>
            <div class="label">Subject</div><div id="ui-subject" class="data">---</div>
            <div class="label">Teacher</div><div id="ui-teacher" class="data">---</div>
        </div>
    </div>

    <div id="ticker"><div id="ticker-text">CONNECTING TO DRIVE...</div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw1GJokTmNPlhliuUyjgVs6G5gG4B5gYO9BW-HKLRHp0qgsnEN32eQbAPJc2lT3o-h-yA/exec"; 
        let mediaItems = [];
        let mediaIdx = 0;

        async function fetchWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.01&current_weather=true&temperature_unit=fahrenheit');
                const data = await response.json();
                document.getElementById('w-temp').innerText = Math.round(data.current_weather.temperature) + "°F NYC";
            } catch (e) { document.getElementById('w-temp').innerText = "NYC"; }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'});
            
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const bells = [800, 847, 935, 1023, 1111, 1158, 1246, 1334];
            const isBell = bells.some(b => (timeNum - b >= 0 && timeNum - b < 5));
            document.getElementById('main-area').className = isBell ? "bell-active" : "";
        }

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.documentElement.style.setProperty('--school-blue', data.settings.primary);
                document.documentElement.style.setProperty('--gold', data.settings.accent);
                document.getElementById('ticker-text').innerText = data.settings.ticker;

                document.getElementById('ui-class').innerText = "Class " + data.schedule.class;
                document.getElementById('ui-room').innerText = data.schedule.room;
                document.getElementById('ui-subject').innerText = data.schedule.subject;
                document.getElementById('ui-teacher').innerText = data.schedule.teacher;
                
                mediaItems = data.media;
            } catch(e) { console.error("Sync Error"); }
        }

       function playMedia() {
    const stage = document.getElementById('visuals');
    if (!mediaItems || mediaItems.length === 0) return;
    
    const item = mediaItems[mediaIdx];
    stage.innerHTML = ''; 

    if (item.type === 'image') {
        const img = new Image();
        // Chrome fix: allow cross-origin loading
        img.crossOrigin = "anonymous"; 
        
        // Use the direct UC link
        img.src = `https://drive.google.com/uc?export=view&id=${item.id}`;
        
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "contain";

        img.onload = () => {
            stage.appendChild(img);
            setTimeout(() => {
                mediaIdx = (mediaIdx + 1) % mediaItems.length;
                playMedia();
            }, 12000); 
        };

        img.onerror = () => {
            console.error("Chrome blocked this image. Check Drive sharing permissions.");
            mediaIdx = (mediaIdx + 1) % mediaItems.length;
            playMedia();
        };

    } else if (item.type === 'video') {
        const vid = document.createElement('video');
        vid.style.width = "100%";
        vid.style.height = "100%";
        vid.muted = true;
        vid.autoplay = true;
        vid.setAttribute('playsinline', 'true');
        
        // Direct download link for Chrome video streaming
        vid.src = `https://drive.google.com/uc?export=download&id=${item.id}`;

        vid.onended = () => {
            mediaIdx = (mediaIdx + 1) % mediaItems.length;
            playMedia();
        };

        stage.appendChild(vid);
        vid.play().catch(e => {
            console.log("Chrome Autoplay Policy requires a user click or 'muted' attribute.");
            mediaIdx = (mediaIdx + 1) % mediaItems.length;
            playMedia();
        });
    }
}

        setInterval(updateTime, 1000);
        setInterval(updateData, 60000); 
        setInterval(fetchWeather, 600000);
        updateData().then(() => {
            // Short delay to ensure mediaItems array is populated before first play
            setTimeout(playMedia, 2000);
        });
        updateTime();
        fetchWeather();
    </script>
</body>
</html>

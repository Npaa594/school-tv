<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>School Signage - All Grades</title>
    <style>
        :root { --school-blue: #003366; --gold: #FFD700; --dark: #121212; }
        body { margin: 0; background: black; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #header { height: 12vh; background: var(--school-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid var(--gold); flex-shrink: 0; }
        .logo-img { height: 8vh; width: auto; object-fit: contain; }
        
        #weather-box { width: 30%; font-size: 1.4rem; font-weight: bold; }
        #clock-container { text-align: center; flex-grow: 1; }
        #clock { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        #date { font-size: 1.1rem; color: var(--gold); text-transform: uppercase; margin-top: 5px; }

        #main-area { display: flex; flex-grow: 1; height: 78vh; background: #000; overflow: hidden; }
        #visuals { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: width 0.7s ease-in-out; }
        #visuals img, #visuals video { width: 100%; height: 100%; object-fit: contain; }

        /* Sidebar: Now a scrolling container for all grades */
        #sidebar { width: 0%; background: var(--dark); padding: 0; opacity: 0; overflow-y: auto; transition: all 0.7s ease-in-out; border-left: 0px solid var(--gold); }
        .bell-active #visuals { width: 45%; }
        .bell-active #sidebar { width: 55%; padding: 15px; opacity: 1; border-left: 5px solid var(--gold); }

        .grade-card { background: #1e1e1e; border-radius: 8px; padding: 10px; margin-bottom: 10px; border-left: 8px solid var(--school-blue); }
        .grade-header { color: var(--gold); font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #333; }
        
        .info-row { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 5px; font-size: 1.1rem; }
        .label-sm { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .val-sm { font-weight: bold; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #ticker { height: 10vh; background: var(--school-blue); display: flex; align-items: center; overflow: hidden; border-top: 4px solid var(--gold); flex-shrink: 0; }
        #ticker-text { white-space: nowrap; font-size: 2.5rem; font-weight: bold; animation: scroll 35s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="header">
        <div style="display: flex; align-items: center; width: 35%;">
            <img src="https://www.newpathwaysacademy.org/pics/school_logo.png" class="logo-img" style="margin-right: 15px;">
            <div id="weather-box"><span id="w-temp">Loading...</span></div>
        </div>
        <div id="clock-container"><div id="clock">00:00:00</div><div id="date">LOADING...</div></div>
        <div style="width: 35%; text-align: right;"><img src="https://www.newpathwaysacademy.org/pics/ibimg.png" class="logo-img"></div>
    </div>

    <div id="main-area">
        <div id="visuals"></div>
        <div id="sidebar">
            <h2 style="color:var(--gold); text-align:center; margin-top:0;">CLASS LOCATIONS</h2>
            <div id="schedule-grid"></div>
        </div>
    </div>

    <div id="ticker"><div id="ticker-text">LOADING...</div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxHWkQxbHJnD_vzd_IH6G1pl-zEFCey_zTZpXv2_7_Ad5258OyJEEH4kxwHpa2WFOuS/exec";
        let mediaItems = [];
        let mediaIdx = 0;

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.01&current_weather=true&temperature_unit=fahrenheit');
                const data = await res.json();
                document.getElementById('w-temp').innerText = Math.round(data.current_weather.temperature) + "°F NYC";
            } catch (e) { document.getElementById('w-temp').innerText = "---°F"; }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'});
            
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const bells = [800, 847, 935, 1023, 1111, 1158, 1246, 1334];
            // Display sidebar for 5 minutes after each bell
            const isBell = bells.some(b => (timeNum - b >= 0 && timeNum - b < 5));
            document.getElementById('main-area').className = isBell ? "bell-active" : "";
        }

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                document.documentElement.style.setProperty('--school-blue', data.settings.primary);
                document.documentElement.style.setProperty('--gold', data.settings.accent);
                document.getElementById('ticker-text').innerText = data.settings.ticker;

                const grid = document.getElementById('schedule-grid');
                grid.innerHTML = ''; 

                data.allSchedules.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'grade-card';
                    card.innerHTML = `
                        <div class="grade-header">Class ${item.class}</div>
                        <div class="info-row">
                            <div><div class="label-sm">Room</div><div class="val-sm">${item.room}</div></div>
                            <div><div class="label-sm">Subject</div><div class="val-sm">${item.subject}</div></div>
                            <div><div class="label-sm">Teacher</div><div class="val-sm">${item.teacher}</div></div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                mediaItems = data.media;
            } catch(e) { console.error("Sync Error"); }
        }

        function playMedia() {
            const stage = document.getElementById('visuals');
            if (mediaItems.length === 0) return;
            const item = mediaItems[mediaIdx];
            stage.innerHTML = '';

            if (item.type === 'image') {
                const img = new Image();
                img.src = `https://drive.google.com/thumbnail?id=${item.id}&sz=w1920`;
                stage.appendChild(img);
                setTimeout(playMedia, 5000); 
            } else {
                const vid = document.createElement('video');
                vid.src = `https://drive.google.com/uc?export=download&id=${item.id}`;
                vid.autoplay = true; vid.muted = true;
                vid.onended = playMedia;
                stage.appendChild(vid);
            }
            mediaIdx = (mediaIdx + 1) % mediaItems.length;
        }

        setInterval(updateTime, 1000);
        setInterval(updateData, 60000); 
        setInterval(fetchWeather, 600000);
        updateData().then(() => playMedia());
        updateTime();
        fetchWeather();
    </script>
</body>
</html>
